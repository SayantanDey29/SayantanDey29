<svg width="940" height="230" viewBox="0 0 940 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0c29" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f0c29" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nameglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="940" height="230" rx="16" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="40" x2="940" y2="40"/><line x1="0" y1="80" x2="940" y2="80"/>
    <line x1="0" y1="120" x2="940" y2="120"/><line x1="0" y1="160" x2="940" y2="160"/>
    <line x1="0" y1="200" x2="940" y2="200"/>
    <line x1="47" y1="0" x2="47" y2="230"/><line x1="94" y1="0" x2="94" y2="230"/>
    <line x1="141" y1="0" x2="141" y2="230"/><line x1="188" y1="0" x2="188" y2="230"/>
    <line x1="235" y1="0" x2="235" y2="230"/><line x1="282" y1="0" x2="282" y2="230"/>
    <line x1="329" y1="0" x2="329" y2="230"/><line x1="376" y1="0" x2="376" y2="230"/>
    <line x1="423" y1="0" x2="423" y2="230"/><line x1="470" y1="0" x2="470" y2="230"/>
    <line x1="517" y1="0" x2="517" y2="230"/><line x1="564" y1="0" x2="564" y2="230"/>
    <line x1="611" y1="0" x2="611" y2="230"/><line x1="658" y1="0" x2="658" y2="230"/>
    <line x1="705" y1="0" x2="705" y2="230"/><line x1="752" y1="0" x2="752" y2="230"/>
    <line x1="799" y1="0" x2="799" y2="230"/><line x1="846" y1="0" x2="846" y2="230"/>
    <line x1="893" y1="0" x2="893" y2="230"/>
  </g>

  <!-- Pulsing rings -->
  <circle cx="90" cy="38" r="1" fill="none" stroke="#6366f1" stroke-width="1.5">
    <animate attributeName="r" values="1;55;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="175" r="1" fill="none" stroke="#a78bfa" stroke-width="1.5">
    <animate attributeName="r" values="1;45;1" dur="5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="600" cy="18" r="1" fill="none" stroke="#818cf8" stroke-width="1.5">
    <animate attributeName="r" values="1;60;1" dur="6s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="6s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="300" cy="200" r="1" fill="none" stroke="#c4b5fd" stroke-width="1">
    <animate attributeName="r" values="1;40;1" dur="7s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="7s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- Floating particles -->
  <circle r="3.5" fill="#6366f1" opacity="0.6">
    <animate attributeName="cx" values="75;83;69;75" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;37;63;55" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.3;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle r="2.5" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cx" values="190;220;180;190" dur="13s" repeatCount="indefinite" begin="-3s"/>
    <animate attributeName="cy" values="155;140;190;155" dur="13s" repeatCount="indefinite" begin="-3s"/>
    <animate attributeName="opacity" values="0.5;0.75;0.2;0.5" dur="13s" repeatCount="indefinite" begin="-3s"/>
  </circle>
  <circle r="4" fill="#818cf8" opacity="0.45">
    <animate attributeName="cx" values="705;697;715;705" dur="11s" repeatCount="indefinite" begin="-2s"/>
    <animate attributeName="cy" values="44;24;59;44" dur="11s" repeatCount="indefinite" begin="-2s"/>
    <animate attributeName="opacity" values="0.45;0.65;0.2;0.45" dur="11s" repeatCount="indefinite" begin="-2s"/>
  </circle>
  <circle r="3" fill="#c4b5fd" opacity="0.55">
    <animate attributeName="cx" values="830;800;845;830" dur="8s" repeatCount="indefinite" begin="-5s"/>
    <animate attributeName="cy" values="143;133;168;143" dur="8s" repeatCount="indefinite" begin="-5s"/>
    <animate attributeName="opacity" values="0.55;0.8;0.25;0.55" dur="8s" repeatCount="indefinite" begin="-5s"/>
  </circle>
  <circle r="2" fill="#6366f1" opacity="0.4">
    <animate attributeName="cx" values="470;485;450;470" dur="15s" repeatCount="indefinite" begin="-1s"/>
    <animate attributeName="cy" values="185;155;195;185" dur="15s" repeatCount="indefinite" begin="-1s"/>
    <animate attributeName="opacity" values="0.4;0.65;0.2;0.4" dur="15s" repeatCount="indefinite" begin="-1s"/>
  </circle>
  <circle r="3" fill="#a5f3fc" opacity="0.35">
    <animate attributeName="cx" values="329;349;314;329" dur="10s" repeatCount="indefinite" begin="-4s"/>
    <animate attributeName="cy" values="22;37;52;22" dur="10s" repeatCount="indefinite" begin="-4s"/>
    <animate attributeName="opacity" values="0.35;0.6;0.15;0.35" dur="10s" repeatCount="indefinite" begin="-4s"/>
  </circle>
  <circle r="2.5" fill="#818cf8" opacity="0.4">
    <animate attributeName="cx" values="583;558;593;583" dur="12s" repeatCount="indefinite" begin="-7s"/>
    <animate attributeName="cy" values="165;175;145;165" dur="12s" repeatCount="indefinite" begin="-7s"/>
  </circle>
  <circle r="3.5" fill="#c084fc" opacity="0.4">
    <animate attributeName="cx" values="47;82;37;47" dur="14s" repeatCount="indefinite" begin="-2s"/>
    <animate attributeName="cy" values="110;95;140;110" dur="14s" repeatCount="indefinite" begin="-2s"/>
  </circle>
  <circle r="1.5" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cx" values="870;850;885;870" dur="7s" repeatCount="indefinite" begin="-6s"/>
    <animate attributeName="cy" values="83;103;53;83" dur="7s" repeatCount="indefinite" begin="-6s"/>
  </circle>
  <circle r="2.5" fill="#6366f1" opacity="0.35">
    <animate attributeName="cx" values="423;448;403;423" dur="16s" repeatCount="indefinite" begin="-8s"/>
    <animate attributeName="cy" values="98;73;113;98" dur="16s" repeatCount="indefinite" begin="-8s"/>
  </circle>
  <circle r="2" fill="#e879f9" opacity="0.3">
    <animate attributeName="cx" values="150;170;130;150" dur="11s" repeatCount="indefinite" begin="-9s"/>
    <animate attributeName="cy" values="90;110;70;90" dur="11s" repeatCount="indefinite" begin="-9s"/>
  </circle>

  <!-- Top shimmer sweep -->
  <rect y="0" width="940" height="2" rx="1" fill="url(#shimmer)">
    <animateTransform attributeName="transform" type="translate" values="-940,0;940,0" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom shimmer sweep -->
  <rect y="228" width="940" height="2" rx="1" fill="url(#shimmer2)">
    <animateTransform attributeName="transform" type="translate" values="940,0;-940,0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Wave hand emoji via Twemoji -->
  <image href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f44b.svg" x="348" y="30" width="22" height="22">
    <animateTransform attributeName="transform" type="rotate" values="-15 359 41;15 359 41;-15 359 41" dur="1.5s" repeatCount="indefinite"/>
  </image>

  <!-- Hi there label -->
  <text x="492" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a78bfa" letter-spacing="5">&#x1F44B; HI THERE, I AM</text>

  <!-- Name with glow -->
  <text x="470" y="112" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700" fill="white" filter="url(#nameglow)" letter-spacing="2">Sayantan Dey</text>

  <!-- Pill badges row -->
  <rect x="168" y="136" width="110" height="28" rx="14" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.55" stroke-width="1"/>
  <text x="223" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#c4b5fd">AI Engineer</text>

  <rect x="292" y="136" width="138" height="28" rx="14" fill="#818cf8" fill-opacity="0.15" stroke="#818cf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="361" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a5b4fc">Computer Vision</text>

  <rect x="444" y="136" width="120" height="28" rx="14" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="504" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ddd6fe">Generative AI</text>

  <rect x="578" y="136" width="160" height="28" rx="14" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1"/>
  <text x="658" y="154" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#a5f3fc">Production-Grade AI</text>

  <!-- Subtext -->
  <text x="470" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6366f1" opacity="0.7" letter-spacing="2">Building Production-Grade AI Solutions</text>
</svg>
